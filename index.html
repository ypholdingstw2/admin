<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>家庭庫存管理 | 揚沛 </title>
    <style>
        /* 全域重置 - 確保所有瀏覽器基礎樣式一致 */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* 使用最穩定的系統字體，確保跨平台 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Helvetica, Arial, sans-serif;
            background: #f5f7fb;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            /* 確保 iOS 安全區域 */
            padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
        }

        /* 主容器 - 響應式最大寬度 */
        .inventory-app {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.05), 0 2px 6px rgba(0, 0, 0, 0.03);
            overflow: hidden;
            transition: all 0.2s ease;
        }

        /* 頁首區域 */
        .app-header {
            padding: 24px 24px 16px 24px;
            background: #ffffff;
            border-bottom: 1px solid #eef2f6;
        }

        @media (max-width: 640px) {
            .app-header {
                padding: 20px 20px 12px 20px;
            }
        }

        .title-section h1 {
            font-size: 1.85rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1e3c5c, #2c5a7a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .title-section p {
            color: #6c7f8f;
            margin-top: 6px;
            font-size: 0.9rem;
        }

        /* 統計卡片 - 使用 flex 確保手機排列 */
        .stats-row {
            display: flex;
            gap: 12px;
            margin: 20px 0 8px 0;
            flex-wrap: wrap;
        }

        .stat-card {
            flex: 1;
            min-width: 120px;
            background: #f8fafd;
            border-radius: 20px;
            padding: 12px 16px;
            border: 1px solid #e9edf2;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: transform 0.1s;
        }

        @media (max-width: 480px) {
            .stat-card {
                min-width: calc(50% - 12px);
            }
        }

        .stat-icon {
            font-size: 28px;
            line-height: 1;
        }

        .stat-info h3 {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #5a6e84;
            margin-bottom: 4px;
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: 800;
            color: #1e4663;
            line-height: 1.1;
        }

        /* 新增表單 - 手機版垂直排列 */
        .add-item-form {
            margin: 20px 24px;
            padding: 18px 20px;
            background: #fafcff;
            border-radius: 24px;
            border: 1px solid #eef2f8;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: flex-end;
        }

        @media (max-width: 768px) {
            .add-item-form {
                margin: 16px 20px;
                padding: 16px;
                flex-direction: column;
                align-items: stretch;
            }
        }

        .form-group {
            flex: 1;
            min-width: 130px;
        }

        .form-group label {
            display: block;
            font-size: 0.7rem;
            font-weight: 600;
            color: #4a627a;
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }

        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 14px;
            border: 1px solid #dce5ed;
            background: white;
            font-size: 0.9rem;
            font-family: inherit;
            transition: all 0.2s;
            -webkit-appearance: none;
            appearance: none;
        }

        .form-group input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .add-btn {
            background: #1f6e43;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
            font-family: inherit;
            margin-top: 6px;
            white-space: nowrap;
        }

        @media (max-width: 768px) {
            .add-btn {
                white-space: normal;
                margin-top: 8px;
            }
        }

        .add-btn:hover {
            background: #0e5a38;
            transform: translateY(-1px);
        }

        .add-btn:active {
            transform: translateY(0);
        }

        /* 操作欄位 */
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin: 0 24px 20px 24px;
        }

        @media (max-width: 640px) {
            .action-bar {
                margin: 0 20px 16px 20px;
                flex-direction: column;
                align-items: stretch;
            }
        }

        .search-box {
            flex: 2;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 10px 16px 10px 38px;
            border-radius: 40px;
            border: 1px solid #dce5ed;
            background: white;
            font-size: 0.9rem;
            font-family: inherit;
            -webkit-appearance: none;
            appearance: none;
        }

        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            opacity: 0.6;
            pointer-events: none;
        }

        .filter-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .filter-badge {
            background: #eff2f7;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            color: #3a5a7a;
            user-select: none;
            white-space: nowrap;
        }

        @media (max-width: 480px) {
            .filter-badge {
                padding: 6px 14px;
                font-size: 0.8rem;
            }
        }

        .filter-badge.active {
            background: #1e4a76;
            color: white;
            box-shadow: 0 2px 8px rgba(30, 74, 118, 0.2);
        }

        /* 表格容器 - 支援橫向捲動 */
        .items-table-wrapper {
            overflow-x: auto;
            margin: 0 20px 20px 20px;
            border-radius: 20px;
            border: 1px solid #eef2f8;
            background: white;
            -webkit-overflow-scrolling: touch;
        }

        @media (max-width: 640px) {
            .items-table-wrapper {
                margin: 0 16px 20px 16px;
                border-radius: 16px;
            }
        }

        .items-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            min-width: 500px;
        }

        .items-table th {
            text-align: left;
            padding: 14px 16px;
            background: #fbfdfe;
            border-bottom: 1px solid #e9edf2;
            color: #2c4c6e;
            font-weight: 600;
            font-size: 0.8rem;
        }

        .items-table td {
            padding: 14px 16px;
            border-bottom: 1px solid #f0f4f9;
            vertical-align: middle;
        }

        .item-name {
            font-weight: 500;
            color: #1f3a54;
            word-break: break-word;
        }

        .item-category {
            background: #eef3fc;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.7rem;
            display: inline-block;
            color: #2c6b9e;
            font-weight: 500;
        }

        .quantity-cell {
            font-weight: 500;
        }

        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .qty-btn {
            background: #f0f3f8;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            font-family: monospace;
            color: #2c4c6e;
        }

        .qty-btn:active {
            transform: scale(0.94);
            background: #e2e8f0;
        }

        .low-stock {
            color: #c2410c;
            background: #fff1e6;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            display: inline-block;
            white-space: nowrap;
        }

        .action-buttons {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .edit-btn, .delete-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 6px 8px;
            border-radius: 30px;
            transition: all 0.15s;
            font-family: inherit;
            line-height: 1;
        }

        .edit-btn:hover {
            background: #eef2ff;
        }

        .delete-btn:hover {
            background: #feece8;
        }

        .empty-row td {
            text-align: center;
            padding: 48px 20px;
            color: #8da0b5;
            font-style: italic;
        }

        /* Modal 彈窗 - 支援手機觸控 */
        .modal-mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.2s, opacity 0.2s;
            padding: 16px;
        }

        .modal-mask.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-container {
            background: white;
            max-width: 400px;
            width: 100%;
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
        }

        .modal-container h3 {
            font-size: 1.4rem;
            margin-bottom: 18px;
            color: #1e3c5c;
            font-weight: 600;
        }

        .modal-container input {
            width: 100%;
            padding: 12px 14px;
            margin: 8px 0;
            border: 1px solid #dce5ed;
            border-radius: 16px;
            font-size: 0.95rem;
            font-family: inherit;
            -webkit-appearance: none;
            appearance: none;
        }

        .modal-container input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 20px;
        }

        .modal-buttons button {
            padding: 10px 20px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: 0.1s;
        }

        .save-modal {
            background: #1e4a76;
            color: white;
        }

        .cancel-modal {
            background: #eef2f6;
            color: #4a627a;
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #8da0b5;
            padding: 16px 20px 20px;
            border-top: 1px solid #eef2f6;
        }

        /* 確保所有觸控元素有足夠點擊區域 */
        button, .filter-badge, .qty-btn, .edit-btn, .delete-btn {
            cursor: pointer;
            touch-action: manipulation;
        }

        /* 手機優化 */
        @media (max-width: 640px) {
            .items-table th, .items-table td {
                padding: 12px 12px;
            }
            .quantity-controls {
                gap: 6px;
            }
            .stat-number {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script type="module">
        // ============================================================
        // 家庭庫存管理系統 - 純 JavaScript 應用
        // 相容於：Chrome, Safari, Firefox, Edge, iOS Safari, Android Chrome
        // 功能：增刪改查、低庫存提醒、本地儲存、響應式操作
        // ============================================================
        
        // ---------- 資料儲存與預設值 ----------
        const STORAGE_KEY = 'family_inventory_system';
        
        // 預設範例資料
        const DEFAULT_ITEMS = [
            { id: '1', name: '白米', category: '糧食', quantity: 12, unit: 'kg', lowStockThreshold: 3 },
            { id: '2', name: '醬油', category: '調味料', quantity: 2, unit: '瓶', lowStockThreshold: 1 },
            { id: '3', name: '雞蛋', category: '蛋奶', quantity: 6, unit: '盒', lowStockThreshold: 2 },
            { id: '4', name: '洗手乳', category: '清潔', quantity: 1, unit: '罐', lowStockThreshold: 1 },
            { id: '5', name: '衛生紙', category: '日用品', quantity: 8, unit: '包', lowStockThreshold: 3 },
            { id: '6', name: '鮮奶', category: '食品', quantity: 2, unit: '瓶', lowStockThreshold: 1 }
        ];
        
        let inventoryItems = [];
        
        // 應用狀態
        let currentFilter = 'all';      // 'all' 或 'lowStock'
        let searchKeyword = '';
        let editingItemId = null;
        
        // DOM 元素
        let appRoot = null;
        let modalElement = null;
        
        // ---------- 輔助函數 ----------
        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substring(2, 8);
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }
        
        // 儲存至 localStorage
        function saveToLocalStorage() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(inventoryItems));
            } catch (e) {
                console.warn('儲存失敗', e);
            }
        }
        
        // 載入資料
        function loadFromLocalStorage() {
            try {
                const stored = localStorage.getItem(STORAGE_KEY);
                if (stored) {
                    const parsed = JSON.parse(stored);
                    if (Array.isArray(parsed) && parsed.length >= 0) {
                        inventoryItems = parsed.map(item => ({
                            ...item,
                            lowStockThreshold: item.lowStockThreshold !== undefined ? item.lowStockThreshold : 2,
                            unit: item.unit || '個',
                            quantity: typeof item.quantity === 'number' ? item.quantity : 0
                        }));
                        return;
                    }
                }
            } catch (e) {
                console.warn('讀取儲存失敗，使用預設資料');
            }
            // 使用預設資料並深拷貝
            inventoryItems = DEFAULT_ITEMS.map(item => ({ ...item }));
            saveToLocalStorage();
        }
        
        // ---------- 業務邏輯 ----------
        function addItem(name, category, quantity, unit) {
            const trimmedName = name ? name.trim() : '';
            if (!trimmedName) {
                alert('請填寫物品名稱');
                return false;
            }
            
            const newItem = {
                id: generateId(),
                name: trimmedName,
                category: category ? category.trim() : '其他',
                quantity: Math.max(0, Number(quantity) || 0),
                unit: unit ? unit.trim() : '個',
                lowStockThreshold: 2
            };
            inventoryItems.unshift(newItem); // 新增在最前面
            saveToLocalStorage();
            renderApp();
            return true;
        }
        
        function updateItem(itemId, updatedData) {
            const index = inventoryItems.findIndex(i => i.id === itemId);
            if (index !== -1) {
                inventoryItems[index] = {
                    ...inventoryItems[index],
                    ...updatedData,
                    quantity: Math.max(0, Number(updatedData.quantity) || 0)
                };
                saveToLocalStorage();
                renderApp();
            }
            closeModal();
        }
        
        function deleteItem(itemId) {
            if (window.confirm('確定要刪除這個物品嗎？')) {
                inventoryItems = inventoryItems.filter(i => i.id !== itemId);
                saveToLocalStorage();
                renderApp();
            }
        }
        
        function adjustQuantity(itemId, delta) {
            const item = inventoryItems.find(i => i.id === itemId);
            if (item) {
                let newQty = (item.quantity || 0) + delta;
                if (newQty < 0) newQty = 0;
                item.quantity = newQty;
                saveToLocalStorage();
                renderApp();
            }
        }
        
        // 過濾與搜尋
        function getFilteredItems() {
            let filtered = [...inventoryItems];
            
            if (currentFilter === 'lowStock') {
                filtered = filtered.filter(item => item.quantity <= item.lowStockThreshold);
            }
            
            if (searchKeyword && searchKeyword.trim() !== '') {
                const keyword = searchKeyword.trim().toLowerCase();
                filtered = filtered.filter(item => 
                    item.name.toLowerCase().includes(keyword) || 
                    item.category.toLowerCase().includes(keyword)
                );
            }
            
            return filtered;
        }
        
        function getStats() {
            const total = inventoryItems.length;
            const lowCount = inventoryItems.filter(item => item.quantity <= item.lowStockThreshold).length;
            return { total, lowCount };
        }
        
        // ---------- Modal 控制 ----------
        function openEditModal(item) {
            editingItemId = item.id;
            if (!modalElement) return;
            
            const nameInput = document.getElementById('modalItemName');
            const catInput = document.getElementById('modalItemCategory');
            const qtyInput = document.getElementById('modalItemQuantity');
            const unitInput = document.getElementById('modalItemUnit');
            
            if (nameInput) nameInput.value = item.name;
            if (catInput) catInput.value = item.category;
            if (qtyInput) qtyInput.value = item.quantity;
            if (unitInput) unitInput.value = item.unit;
            
            modalElement.classList.add('active');
        }
        
        function closeModal() {
            if (modalElement) {
                modalElement.classList.remove('active');
            }
            editingItemId = null;
        }
        
        function handleSaveEdit() {
            if (!editingItemId) return;
            
            const nameInput = document.getElementById('modalItemName');
            const catInput = document.getElementById('modalItemCategory');
            const qtyInput = document.getElementById('modalItemQuantity');
            const unitInput = document.getElementById('modalItemUnit');
            
            const newName = nameInput ? nameInput.value.trim() : '';
            const newCategory = catInput ? catInput.value.trim() : '';
            const newQuantity = parseInt(qtyInput ? qtyInput.value : '0', 10);
            const newUnit = unitInput ? unitInput.value.trim() : '';
            
            if (!newName) {
                alert('物品名稱不能為空');
                return;
            }
            
            if (isNaN(newQuantity)) {
                alert('請輸入有效數量');
                return;
            }
            
            updateItem(editingItemId, {
                name: newName,
                category: newCategory || '其他',
                quantity: newQuantity,
                unit: newUnit || '個'
            });
        }
        
        // ---------- 渲染整個應用 (確保所有瀏覽器相容) ----------
        function renderApp() {
            if (!appRoot) return;
            
            const stats = getStats();
            const filteredList = getFilteredItems();
            
            // 建構 HTML 結構 - 使用最穩定的字串模板
            const mainHtml = `
                <div class="inventory-app">
                    <div class="app-header">
                        <div class="title-section">
                            <h1>🏠 家庭庫存管理</h1>
                            <p>跨裝置同步 · 輕鬆管理家中物資</p>
                        </div>
                        <div class="stats-row">
                            <div class="stat-card">
                                <div class="stat-icon">📦</div>
                                <div class="stat-info">
                                    <h3>總品項</h3>
                                    <div class="stat-number">${stats.total}</div>
                                </div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-icon">⚠️</div>
                                <div class="stat-info">
                                    <h3>低庫存</h3>
                                    <div class="stat-number">${stats.lowCount}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="add-item-form">
                        <div class="form-group">
                            <label>物品名稱 *</label>
                            <input type="text" id="newItemName" placeholder="例：鮮奶" autocomplete="off">
                        </div>
                        <div class="form-group">
                            <label>分類</label>
                            <input type="text" id="newItemCategory" placeholder="食品 / 日用品" autocomplete="off">
                        </div>
                        <div class="form-group">
                            <label>數量</label>
                            <input type="number" id="newItemQuantity" placeholder="數量" value="1" step="1">
                        </div>
                        <div class="form-group">
                            <label>單位</label>
                            <input type="text" id="newItemUnit" placeholder="個/瓶/包" autocomplete="off">
                        </div>
                        <button class="add-btn" id="addItemBtn">+ 新增物品</button>
                    </div>
                    
                    <div class="action-bar">
                        <div class="search-box">
                            <input type="text" id="searchInput" placeholder="搜尋名稱或分類..." value="${escapeHtml(searchKeyword)}" autocomplete="off">
                        </div>
                        <div class="filter-group">
                            <span class="filter-badge ${currentFilter === 'all' ? 'active' : ''}" data-filter="all">📋 全部</span>
                            <span class="filter-badge ${currentFilter === 'lowStock' ? 'active' : ''}" data-filter="lowStock">⚠️ 低庫存</span>
                        </div>
                    </div>
                    
                    <div class="items-table-wrapper">
                        <table class="items-table">
                            <thead>
                                <tr>
                                    <th>物品名稱</th>
                                    <th>分類</th>
                                    <th>數量</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${filteredList.length === 0 ? 
                                    `<tr class="empty-row"><td colspan="4">✨ 目前沒有物品，點擊「新增物品」開始記錄吧 ✨</td></tr>` :
                                    filteredList.map(item => {
                                        const isLow = item.quantity <= item.lowStockThreshold;
                                        return `
                                        <tr data-item-id="${item.id}">
                                            <td class="item-name"><strong>${escapeHtml(item.name)}</strong></td>
                                            <td><span class="item-category">${escapeHtml(item.category)}</span></td>
                                            <td class="quantity-cell">
                                                <div class="quantity-controls">
                                                    <button class="qty-btn" data-id="${item.id}" data-delta="-1" aria-label="減少數量">−</button>
                                                    <span style="min-width: 55px; text-align: center; font-weight: 500;">${item.quantity} ${escapeHtml(item.unit)}</span>
                                                    <button class="qty-btn" data-id="${item.id}" data-delta="1" aria-label="增加數量">+</button>
                                                    ${isLow ? '<span class="low-stock">⚠️ 庫存偏低</span>' : ''}
                                                </div>
                                            </td>
                                            <td>
                                                <div class="action-buttons">
                                                    <button class="edit-btn" data-id="${item.id}" aria-label="編輯">✏️ 編輯</button>
                                                    <button class="delete-btn" data-id="${item.id}" aria-label="刪除">🗑️ 刪除</button>
                                                </div>
                                            </td>
                                        </tr>
                                        `;
                                    }).join('')
                                }
                            </tbody>
                        </table>
                    </div>
                    <footer>💡 提示：點擊 +/- 快速增減數量 | 低庫存自動標記 | 資料自動儲存於瀏覽器</footer>
                </div>
                <div id="editModal" class="modal-mask">
                    <div class="modal-container">
                        <h3>✏️ 編輯物品</h3>
                        <input type="text" id="modalItemName" placeholder="物品名稱" autocomplete="off">
                        <input type="text" id="modalItemCategory" placeholder="分類" autocomplete="off">
                        <input type="number" id="modalItemQuantity" placeholder="數量" step="1">
                        <input type="text" id="modalItemUnit" placeholder="單位" autocomplete="off">
                        <div class="modal-buttons">
                            <button class="cancel-modal" id="closeModalBtn">取消</button>
                            <button class="save-modal" id="saveModalBtn">儲存變更</button>
                        </div>
                    </div>
                </div>
            `;
            
            appRoot.innerHTML = mainHtml;
            
            // 重新獲取 modal 參考
            modalElement = document.getElementById('editModal');
            
            // 綁定所有事件
            attachEvents();
        }
        
        // 事件綁定 (確保所有瀏覽器相容)
        function attachEvents() {
            // 新增物品
            const addBtn = document.getElementById('addItemBtn');
            if (addBtn) {
                addBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    const nameInput = document.getElementById('newItemName');
                    const catInput = document.getElementById('newItemCategory');
                    const qtyInput = document.getElementById('newItemQuantity');
                    const unitInput = document.getElementById('newItemUnit');
                    
                    const name = nameInput ? nameInput.value : '';
                    const category = catInput ? catInput.value : '';
                    const quantity = qtyInput ? parseInt(qtyInput.value, 10) : 0;
                    const unit = unitInput ? unitInput.value : '';
                    
                    if (addItem(name, category, quantity, unit)) {
                        if (nameInput) nameInput.value = '';
                        if (catInput) catInput.value = '';
                        if (qtyInput) qtyInput.value = '1';
                        if (unitInput) unitInput.value = '';
                    }
                });
            }
            
            // 搜尋
            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.addEventListener('input', function(e) {
                    searchKeyword = e.target.value;
                    renderApp();
                });
            }
            
            // 過濾按鈕 (事件委託或直接綁定)
            const filterBadges = document.querySelectorAll('.filter-badge');
            filterBadges.forEach(badge => {
                badge.addEventListener('click', function() {
                    const filterValue = this.getAttribute('data-filter');
                    if (filterValue === 'all') currentFilter = 'all';
                    else if (filterValue === 'lowStock') currentFilter = 'lowStock';
                    renderApp();
                });
            });
            
            // 數量增減 (事件委託方式更穩健，但由於每次渲染會重建，直接綁定也可)
            const qtyBtns = document.querySelectorAll('.qty-btn');
            qtyBtns.forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const id = this.getAttribute('data-id');
                    const delta = parseInt(this.getAttribute('data-delta'), 10);
                    if (id && !isNaN(delta)) {
                        adjustQuantity(id, delta);
                    }
                });
            });
            
            // 編輯按鈕
            const editBtns = document.querySelectorAll('.edit-btn');
            editBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    const id = this.getAttribute('data-id');
                    const item = inventoryItems.find(i => i.id === id);
                    if (item) openEditModal(item);
                });
            });
            
            // 刪除按鈕
            const deleteBtns = document.querySelectorAll('.delete-btn');
            deleteBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    const id = this.getAttribute('data-id');
                    if (id) deleteItem(id);
                });
            });
            
            // Modal 事件
            if (modalElement) {
                const closeBtn = document.getElementById('closeModalBtn');
                const saveBtn = document.getElementById('saveModalBtn');
                if (closeBtn) closeBtn.addEventListener('click', closeModal);
                if (saveBtn) saveBtn.addEventListener('click', handleSaveEdit);
                
                // 點擊背景關閉
                modalElement.addEventListener('click', function(e) {
                    if (e.target === modalElement) closeModal();
                });
            }
        }
        
        // ---------- 初始化應用 ----------
        function init() {
            appRoot = document.getElementById('app');
            if (!appRoot) {
                console.error('找不到 app 容器');
                return;
            }
            loadFromLocalStorage();
            renderApp();
        }
        
        // 啟動應用
        init();
    </script>
</body>
</html>
